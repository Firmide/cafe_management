<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Наше кафе{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Закрепленная верхняя панель */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: #1a1a1a;
            color: white;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .logo {
            font-size: 1.2rem;
            font-weight: 500;
            color: white;
            text-decoration: none;
        }
        
        .cart-button {
            background-color: #C4A484;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .cart-button:hover {
            background-color: #B08F6F;
        }
        
        .cart-button span {
            background-color: white;
            color: #C4A484;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.7rem;
            min-width: 20px;
            text-align: center;
        }
        
        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: white;
            border-top: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 1000;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #999;
            font-size: 0.7rem;
            transition: color 0.2s;
        }
        
        .nav-item.active {
            color: #C4A484;
        }
        
        .nav-item i {
            font-size: 1.2rem;
            margin-bottom: 2px;
        }
        
        .nav-item span {
            font-size: 0.7rem;
        }
        
        /* Основной контент с отступами */
        .main-content {
            padding: 16px 16px 70px 16px;
            min-height: 100vh;
            background-color: #F9F9F9;
        }
        
        /* Страница корзины */
        .cart-page {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-name {
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .cart-item-price {
            color: #C4A484;
            font-weight: 600;
        }
        
        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .cart-item-controls button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #C4A484;
            background: white;
            color: #C4A484;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .cart-item-controls button:hover {
            background: #C4A484;
            color: white;
        }
        
        .cart-total {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 1.2rem;
        }
        
        .checkout-button {
            width: 100%;
            padding: 14px;
            background: #C4A484;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            margin-top: 16px;
            cursor: pointer;
        }
        
        .checkout-button:hover {
            background: #B08F6F;
        }
        
        @media (max-width: 768px) {
            .logo {
                font-size: 1rem;
            }
            
            .cart-button {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Закрепленная верхняя панель -->
    <div class="top-bar">
        <a href="{% url 'customer:menu' %}" class="logo">🍽️ Наше кафе</a>
        <a href="{% url 'customer:cart_page' %}" class="cart-button">
            🛒 Корзина <span id="cartBadge">0</span>
        </a>
    </div>

    <!-- Основной контент -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- Нижняя навигация -->
    <div class="bottom-nav">
        <a href="{% url 'customer:menu' %}" class="nav-item {% if request.resolver_match.url_name == 'menu' %}active{% endif %}">
            <i>🍽️</i>
            <span>Меню</span>
        </a>
        <a href="{% url 'customer:my_orders' %}" class="nav-item {% if request.resolver_match.url_name == 'my_orders' %}active{% endif %}">
            <i>📋</i>
            <span>Мои заказы</span>
        </a>
    </div>

    <script>
        // Функция для обновления счетчика корзины
        function updateCartBadge() {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = totalItems;
        }
        
        // Обновляем при загрузке
        document.addEventListener('DOMContentLoaded', updateCartBadge);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
