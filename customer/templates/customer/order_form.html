{% extends "customer/base.html" %}

{% block title %}Оформление заказа{% endblock %}

{% block extra_css %}
<style>
    /* ========== МОБИЛЬНЫЕ СТИЛИ ========== */
    @media (max-width: 768px) {
        .card {
            border-radius: 0 !important;
            margin: -1rem -1rem 0 -1rem;
            box-shadow: none !important;
            border-left: none !important;
            border-right: none !important;
        }
        
        .card-header {
            border-radius: 0 !important;
            padding: 1rem !important;
        }
        
        .btn-success {
            padding: 16px !important;
            font-size: 1.2rem !important;
            border-radius: 50px !important;
        }
        
        input.form-control {
            padding: 14px !important;
            font-size: 16px !important;
            border-radius: 30px !important;
        }
        
        .container {
            padding-left: 0 !important;
            padding-right: 0 !important;
        }
        
        h4 {
            font-size: 1.3rem !important;
        }
        
        .alert {
            border-radius: 0 !important;
            margin: 0 0 1rem 0 !important;
        }
        
        #cart-summary {
            padding: 0 1rem;
        }
        
        .fw-bold {
            font-size: 1.1rem;
        }
    }
    
    /* Общие стили */
    .badge.bg-danger {
        font-size: 0.9rem;
        padding: 0.5rem 0.8rem;
    }
    
    #cart-items-list {
        max-height: 300px;
        overflow-y: auto;
    }
    
    .error-message {
        color: #dc3545;
        font-size: 0.85rem;
        margin-top: 5px;
        display: none;
    }
    
    .error-message.show {
        display: block;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">📝 Оформление заказа</h4>
                </div>
                <div class="card-body">
                    
                    <!-- Убрали большой блок с занятыми столами -->
                    
                    <div id="cart-summary" class="mb-4">
                        <h5>Ваш заказ:</h5>
                        <div id="cart-items-list"></div>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <strong>Итого:</strong>
                            <strong class="text-success" id="order-total">0 ₽</strong>
                        </div>
                    </div>
                    
                    <form method="POST" id="orderForm">
                        {% csrf_token %}
                        
                        <div class="form-group">
                            <label for="table_number" class="form-label">Номер стола</label>
                            <input type="number" name="table_number" id="table_number" 
                                   class="form-control" min="1" required 
                                   placeholder="Введите номер вашего стола">
                            <div id="table-error" class="error-message"></div>
                        </div>
                        
                        <input type="hidden" name="cart_data" id="cart_data">
                        
                        <button type="submit" class="btn btn-success w-100" id="submitBtn">
                            ✅ Подтвердить заказ
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Загружаем корзину
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    
    // Если корзина пуста, перенаправляем в меню
    if (cart.length === 0) {
        window.location.href = "{% url 'customer:menu' %}";
    }
    
    // Отображаем содержимое корзины
    const cartItemsList = document.getElementById('cart-items-list');
    const orderTotal = document.getElementById('order-total');
    const cartData = document.getElementById('cart_data');
    
    let html = '';
    let total = 0;
    
    cart.forEach(item => {
        total += item.price * item.quantity;
        html += `
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div>
                    <strong>${escapeHtml(item.name)}</strong>
                    <br>
                    <small class="text-muted">${item.quantity} x ${item.price} ₽</small>
                </div>
                <span class="fw-bold">${item.price * item.quantity} ₽</span>
            </div>
        `;
    });
    
    cartItemsList.innerHTML = html;
    orderTotal.textContent = total + ' ₽';
    
    // Сохраняем данные корзины в скрытое поле
    cartData.value = JSON.stringify(cart);
    
    // Обработка отправки формы
    const orderForm = document.getElementById('orderForm');
    const tableInput = document.getElementById('table_number');
    const errorDiv = document.getElementById('table-error');
    const submitBtn = document.getElementById('submitBtn');
    
    // Функция для экранирования HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    orderForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const tableNumber = tableInput.value.trim();
        
        if (!tableNumber) {
            errorDiv.textContent = 'Введите номер стола';
            errorDiv.classList.add('show');
            return;
        }
        
        // Блокируем кнопку, чтобы не было повторных отправок
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Проверка...';
        
        // Проверяем, свободен ли стол через AJAX
        try {
            const response = await fetch('/check-table/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: JSON.stringify({ table_number: tableNumber })
            });
            
            const data = await response.json();
            
            if (data.busy) {
                errorDiv.textContent = `Стол ${tableNumber} уже занят. Пожалуйста, уточните номер стола.`;
                errorDiv.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = '✅ Подтвердить заказ';
            } else {
                errorDiv.classList.remove('show');
                // Отправляем форму
                orderForm.submit();
            }
        } catch (err) {
            console.error('Ошибка проверки стола:', err);
            // Если проверка не удалась, всё равно отправляем форму
            orderForm.submit();
        }
    });
    
    // Убираем ошибку при изменении номера стола
    tableInput.addEventListener('input', function() {
        errorDiv.classList.remove('show');
    });
    
    // Устанавливаем флаг в sessionStorage, что заказ оформлен
    sessionStorage.setItem('order_placed', 'true');
</script>
{% endblock %}
