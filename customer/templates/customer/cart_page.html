{% extends "customer/base.html" %}

{% block title %}Корзина{% endblock %}

{% block content %}
<div class="cart-page">
    <h2 style="margin-bottom: 20px;">🛒 Ваша корзина</h2>
    
    <div id="cart-items">
        <div style="text-align: center; padding: 40px; color: #999;">
            Загрузка...
        </div>
    </div>
    
    <div class="cart-total">
        <span>Итого:</span>
        <span id="cart-total">0 ₽</span>
    </div>
    
    <button class="checkout-button" onclick="checkout()">
        ✅ Оформить заказ
    </button>
</div>

<script>
    // Загружаем корзину
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    
    function displayCart() {
        const cartItems = document.getElementById('cart-items');
        const cartTotal = document.getElementById('cart-total');
        
        if (cart.length === 0) {
            cartItems.innerHTML = `
                <div style="text-align: center; padding: 40px; color: #999;">
                    <p style="font-size: 3rem; margin-bottom: 20px;">🛒</p>
                    <p>Корзина пуста</p>
                    <a href="{% url 'customer:menu' %}" class="btn" style="display: inline-block; margin-top: 20px; padding: 10px 30px; background: #C4A484; color: white; border-radius: 30px; text-decoration: none;">
                        Перейти в меню
                    </a>
                </div>
            `;
            cartTotal.textContent = '0 ₽';
            return;
        }
        
        let html = '';
        let total = 0;
        
        cart.forEach((item, index) => {
            total += item.price * item.quantity;
            html += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${item.price} ₽</div>
                    </div>
                    <div class="cart-item-controls">
                        <button onclick="updateQuantity(${index}, -1)">−</button>
                        <span style="min-width: 30px; text-align: center;">${item.quantity}</span>
                        <button onclick="updateQuantity(${index}, 1)">+</button>
                        <button onclick="removeItem(${index})" style="border-color: #dc3545; color: #dc3545;">🗑️</button>
                    </div>
                </div>
            `;
        });
        
        cartItems.innerHTML = html;
        cartTotal.textContent = total + ' ₽';
        updateCartBadge(); // обновляем счетчик в шапке
    }
    
    window.updateQuantity = function(index, change) {
        cart[index].quantity += change;
        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        displayCart();
    };
    
    window.removeItem = function(index) {
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        displayCart();
    };
    
    window.checkout = function() {
        if (cart.length === 0) {
            alert('Корзина пуста');
            return;
        }
        window.location.href = "{% url 'customer:order_create' %}";
    };
    
    displayCart();
</script>
{% endblock %}
