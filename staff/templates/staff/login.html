{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — У Артура</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 40px;
            max-width: 450px;
            width: 100%;
            transition: transform 0.3s;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #3A2C2C;
            margin-bottom: 5px;
        }
        
        .logo span {
            color: #C4A484;
        }
        
        .logo p {
            color: #7F8C8D;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2C3E50;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #C4A484;
            box-shadow: 0 0 0 3px rgba(196, 164, 132, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .error-message {
            background: #FEE2E2;
            color: #DC2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #95A5A6;
            font-size: 0.8rem;
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .logo h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>У <span>Артура</span></h1>
            <p>Панель управления персоналом</p>
        </div>
        
        {% if form.errors %}
        <div class="error-message">
            ⚠️ Неверный логин или пароль. Попробуйте снова.
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'staff:login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">Имя пользователя</label>
                <input type="text" name="username" id="id_username" class="form-control" 
                       placeholder="Введите логин" autofocus required>
            </div>
            
            <div class="form-group">
                <label for="id_password">Пароль</label>
                <input type="password" name="password" id="id_password" class="form-control" 
                       placeholder="Введите пароль" required>
            </div>
            
            <button type="submit" class="btn-login">
                Войти в систему
            </button>
            
            <input type="hidden" name="next" value="{{ next }}">
        </form>
        
        <div class="footer">
            © {% now "Y" %} Кафе «У Артура»
        </div>
    </div>
</body>
</html>
